<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <link rel="stylesheet" href="/menu/style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 2. BANNER DEL RESTAURANTE -->
        <header id="restaurant-header" class="hidden">
            <div id="restaurant-banner"></div>
            <div class="header-content">
                <img id="logo" src="" alt="Logo">
                <h1 id="restaurant-name"></h1>
                <p id="restaurant-address"></p>
                <p id="restaurant-phone" class="phone-text"></p>
            </div>
        </header>

        <nav id="category-tabs" class="hidden">
            <!-- Tabs injected via JS -->
        </nav>

        <main id="menu-container" class="hidden">
            <!-- Items injected via JS -->
        </main>

        <div id="loading" class="spinner">
            Cargando menú...
        </div>
        
        <div id="error" class="hidden error-msg">
            No se pudo cargar el menú. Asegúrate de escanear el QR correcto.
        </div>

        <!-- 3. BOTÓN DE WHATSAPP -->
        <a id="whatsapp-btn" class="hidden" target="_blank" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-whatsapp" viewBox="0 0 16 16">
                <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
            </svg>
            <span>Ordenar por WhatsApp</span>
        </a>

        <!-- 5. VISTA DE DETALLE (MODAL) -->
        <div id="item-modal" class="hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <button id="modal-close">&times;</button>
                <img id="modal-img" src="" alt="Platillo" onerror="this.onerror=null;this.src='/menu/placeholder-food.png';">
                <div class="modal-body">
                    <h2 id="modal-title"></h2>
                    <p id="modal-desc"></p>
                    <div id="modal-price-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/menu/app.js"></script>
</body>
</html>
